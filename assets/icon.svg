<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="WC Linked Variations">
	<defs>
		<linearGradient id="wclvBg" x1="8" y1="8" x2="248" y2="248" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#8a5fc0"/>
			<stop offset="1" stop-color="#553a84"/>
		</linearGradient>
		<linearGradient id="wclvSheen" x1="128" y1="8" x2="128" y2="248" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
			<stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
		</linearGradient>
		<filter id="wclvShadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c1a4d" flood-opacity="0.35"/>
		</filter>
	</defs>

	<!-- Badge background -->
	<rect x="8" y="8" width="240" height="240" rx="52" fill="url(#wclvBg)"/>
	<rect x="8" y="8" width="240" height="240" rx="52" fill="url(#wclvSheen)"/>
	<rect x="8.75" y="8.75" width="238.5" height="238.5" rx="51.25" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>

	<!-- Link connecting the products -->
	<line x1="64" y1="64" x2="192" y2="192" stroke="#ffffff" stroke-opacity="0.92" stroke-width="17" stroke-linecap="round"/>

	<!-- Product tiles -->
	<g filter="url(#wclvShadow)">
		<rect x="35" y="35" width="58" height="58" rx="16" fill="#ffffff"/>
		<rect x="99" y="99" width="58" height="58" rx="16" fill="#ffffff"/>
		<rect x="163" y="163" width="58" height="58" rx="16" fill="#ffffff"/>
	</g>

	<!-- Variation swatches -->
	<rect x="50" y="50" width="28" height="28" rx="8" fill="#2dd4bf"/>
	<rect x="114" y="114" width="28" height="28" rx="8" fill="#fbbf24"/>
	<rect x="178" y="178" width="28" height="28" rx="8" fill="#fb7185"/>
</svg>
