name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          mkdir -p build/wc-linked-variations
          rsync -a --exclude='.git' --exclude='.github' --exclude='composer.phar' --exclude='*.log' ./ build/wc-linked-variations/
          cd build && zip -rq wc-linked-variations.zip wc-linked-variations/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: build/wc-linked-variations.zip
          generate_release_notes: true
